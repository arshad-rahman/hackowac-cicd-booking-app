services:
  db:
    image: postgres:16
    container_name: booking-db
    environment:
      POSTGRES_USER: hackowac
      POSTGRES_PASSWORD: HW@pg
      POSTGRES_DB: bookingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackowac -d bookingdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: booking-backend
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: hackowac
      DB_PASSWORD: HW@pg
      DB_NAME: bookingdb
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: booking-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: