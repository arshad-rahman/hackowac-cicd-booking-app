- name: Update apt cache
  apt:
    update_cache: yes
  become: true

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  become: true

- name: Install Docker (Ubuntu)
  apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present
  become: true

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started
  become: true