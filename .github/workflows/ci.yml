name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/hackowac-cicd-booking-app-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/hackowac-cicd-booking-app-frontend:latest ./frontend

      - name: Push backend Docker image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/hackowac-cicd-booking-app-backend:latest

      - name: Push frontend Docker image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/hackowac-cicd-booking-app-frontend:latest